<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D7C66"/>
      <stop offset="100%" stop-color="#0A5E4D"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="50%" stop-color="#E8C36A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <filter id="inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)" filter="url(#inner-shadow)"/>
  <!-- Inner border -->
  <rect x="12" y="12" width="488" height="488" rx="84" fill="none" stroke="#D4A843" stroke-width="2.5" opacity="0.35"/>
  <!-- Letter ص -->
  <text x="256" y="368" text-anchor="middle" font-family="Cairo, Noto Sans Arabic, Arial, sans-serif" font-size="310" font-weight="800" fill="url(#gold-grad)" dominant-baseline="auto">ص</text>
</svg>
